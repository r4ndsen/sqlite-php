name: PHP Composer

on:
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - '**.md'
  push:
    branches: [ "main" ]
    paths-ignore:
      - '**.md'

permissions:
  contents: read

jobs:
  tests:
    name: PHP ${{ matrix.php }} tests on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - ubuntu-latest
          - windows-latest
        php:
          - 8.2
          - 8.3
          - 8.4
          - 8.5
        experimental: [ false ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP with SQLite3 and Xdebug
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: sqlite3, xdebug
          coverage: xdebug

      - name: Validate composer.json and composer.lock
        run: composer validate --strict

      - name: Install composer dependencies
        uses: ramsey/composer-install@v1

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse --ansi

      - name: Run test suite with text coverage
        run: |
          mkdir -p ./build/logs
          vendor/bin/phpunit --coverage-text --coverage-clover build/logs/clover.xml
        env:
          XDEBUG_MODE: coverage

      - name: Upload coverage results to Coveralls
        if: matrix.experimental == false && matrix.os == 'ubuntu-latest' && matrix.php == '8.5' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        env:
          COVERALLS_REPO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: vendor/bin/php-coveralls --coverage_clover=build/logs/clover.xml --verbose
