name: PHP Composer

on:
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - '**.md'
  push:
    branches: [ "main" ]
    paths-ignore:
      - '**.md'

permissions:
  contents: read

jobs:
  tests:
    name: PHP ${{ matrix.php }} tests on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - ubuntu-18.04
          - ubuntu-20.04
          - ubuntu-latest
          - windows-latest
        php:
          - 8.2
          - 8.3
          - 8.4
        experimental: [ false ]
        include:
          - php: 8.5
            os: ubuntu-latest
            experimental: true
            composer-options: '--ignore-platform-reqs'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP with SQLite3 and Xdebug
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: sqlite3, xdebug
          coverage: xdebug

      - name: Validate composer.json and composer.lock
        run: composer validate --strict

      - name: Install composer dependencies
        uses: ramsey/composer-install@v1
        with:
          composer-options: ${{ matrix.composer-options }}

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse --ansi

      - name: Run test suite with text coverage
        run: vendor/bin/phpunit  --coverage-text --coverage-clover build/logs/clover.xml
