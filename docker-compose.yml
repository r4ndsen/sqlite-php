services:
  php-8.2:
    image: php:8.2-cli
    volumes:
      - .:/app
    working_dir: /app
    command: >
      bash -c "apt-get update &&
               apt-get install -y libsqlite3-dev &&
               apt-get clean &&
               rm -rf /var/lib/apt/lists/* &&
               tail -f /dev/null"

